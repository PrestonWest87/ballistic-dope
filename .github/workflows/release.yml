name: Release (Android)

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: 1
  EAS_BUILD_NO_EXPO_GO_WARNING: true

jobs:
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

  build-apk:
    needs: version-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli expo

      - name: Create app.json
        working-directory: apps/mobile
        run: |
          cat > app.json << 'EOF'
          {
            "expo": {
              "name": "Ballistic Dope",
              "slug": "ballistic-dope",
              "version": "1.0.0",
              "orientation": "portrait"
            },
            "android": {
              "package": "com.ballisticdope.app"
            },
            "extra": {
              "eas": {
                "projectId": "5dbb1468-ac2b-4258-9330-21bad94b2d93"
              }
            }
          }
          EOF

      - name: Create eas.json
        working-directory: apps/mobile
        run: echo '{"build":{"production":{}}}' > eas.json

      - name: Run Expo Prebuild
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean

      - name: Build Debug APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk

  build-eas:
    needs: version-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Create app.json
        working-directory: apps/mobile
        run: |
          cat > app.json << 'EOF'
          {
            "expo": {
              "name": "Ballistic Dope",
              "slug": "ballistic-dope",
              "version": "1.0.0",
              "orientation": "portrait"
            },
            "android": {
              "package": "com.ballisticdope.app"
            },
            "extra": {
              "eas": {
                "projectId": "5dbb1468-ac2b-4258-9330-21bad94b2d93"
              }
            }
          }
          EOF

      - name: Create eas.json
        working-directory: apps/mobile
        run: echo '{"build":{"production":{}}}' > eas.json

      - name: Link EAS
        working-directory: apps/mobile
        run: echo "y" | eas project:init --id 5dbb1468-ac2b-4258-9330-21bad94b2d93 --non-interactive

      - name: Build Android (EAS)
        working-directory: apps/mobile
        run: eas build --platform android --non-interactive --profile production

  create-release:
    needs: [version-check, build-apk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ needs.version-check.outputs.version }}
          draft: true
          prerelease: false
          files: |
            *.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
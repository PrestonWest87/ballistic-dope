name: Build Desktop (Windows/macOS)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install CocoaPods
        run: |
          cd apps/mobile/ios
          pod install
        shell: pwsh

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Windows
        run: npx react-native run-windows --arch x64 --release
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: apps/mobile/windows/AppPackages

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install CocoaPods
        run: |
          cd apps/mobile/macos
          pod install

      - name: Build macOS
        run: xcodebuild -workspace macos/BallisticDope.xcworkspace -scheme BallisticDope -configuration Release -arch arm64
        working-directory: apps/mobile

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: apps/mobile/macos/build/Release
name: Release (Android)

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: 1
  EAS_BUILD_NO_EXPO_GO_WARNING: true
  NODE_ENV: production

jobs:
  version-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

  build-apk:
    needs: version-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install expo-asset compatible version
        run: npm install expo-asset@11.0.0 --save-exact

      - name: Fix import paths
        run: |
          sed -i "s|from '../../../packages/theme/src'|from '../packages/theme/src'|g" app/*.tsx
          sed -i "s|from '../../../packages/core/src'|from '../packages/core/src'|g" app/*.tsx

      - name: Clean and Run Expo Prebuild
        run: npx expo prebuild --platform android --clean

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  create-release:
    needs: [version-check, build-apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ needs.version-check.outputs.version }}
          draft: true
          prerelease: false
          files: |
            *.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
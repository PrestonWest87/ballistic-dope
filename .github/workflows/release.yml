name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: 1

jobs:
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

  build-android:
    needs: version-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write app.json
        working-directory: apps/mobile
        run: |
          cat > app.json << 'APPEOF'
          {
            "expo": {
              "name": "Ballistic Dope",
              "slug": "ballistic-dope",
              "version": "1.0.0",
              "orientation": "portrait",
              "icon": "./assets/icon.png",
              "userInterfaceStyle": "dark",
              "splash": {
                "image": "./assets/splash.png",
                "resizeMode": "contain",
                "backgroundColor": "#1a1a2e"
              }
            },
            "ios": {
              "supportsTablet": true,
              "bundleIdentifier": "com.ballisticdope.app",
              "infoPlist": {
                "ITSAppUsesNonExemptEncryption": false
              }
            },
            "android": {
              "adaptiveIcon": {
                "backgroundColor": "#1a1a2e"
              },
              "package": "com.ballisticdope.app"
            },
            "extra": {
              "eas": {
                "projectId": "5dbb1468-ac2b-4258-9330-21bad94b2d93"
              }
            }
          }
          APPEOF

      - name: Write eas.json
        working-directory: apps/mobile
        run: |
          cat > eas.json << 'EASEOF'
          {"build":{"production":{}}}
          EASEOF

      - name: Link EAS Project
        working-directory: apps/mobile
        run: eas project:init --id 5dbb1468-ac2b-4258-9330-21bad94b2d93 --force --non-interactive

      - name: Build Android Release
        working-directory: apps/mobile
        run: eas build --platform android --non-interactive

      - name: Upload Android
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/mobile/android/app/build/outputs/*.apk

  build-ios:
    needs: version-check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Write app.json
        working-directory: apps/mobile
        run: |
          cat > app.json << 'APPEOF'
          {
            "expo": {
              "name": "Ballistic Dope",
              "slug": "ballistic-dope",
              "version": "1.0.0",
              "orientation": "portrait",
              "icon": "./assets/icon.png",
              "userInterfaceStyle": "dark",
              "splash": {
                "image": "./assets/splash.png",
                "resizeMode": "contain",
                "backgroundColor": "#1a1a2e"
              }
            },
            "ios": {
              "supportsTablet": true,
              "bundleIdentifier": "com.ballisticdope.app",
              "infoPlist": {
                "ITSAppUsesNonExemptEncryption": false
              }
            },
            "android": {
              "adaptiveIcon": {
                "backgroundColor": "#1a1a2e"
              },
              "package": "com.ballisticdope.app"
            },
            "extra": {
              "eas": {
                "projectId": "5dbb1468-ac2b-4258-9330-21bad94b2d93"
              }
            }
          }
          APPEOF

      - name: Write eas.json
        working-directory: apps/mobile
        run: |
          cat > eas.json << 'EASEOF'
          {"build":{"production":{}}}
          EASEOF

      - name: Link EAS Project
        working-directory: apps/mobile
        run: eas project:init --id 5dbb1468-ac2b-4258-9330-21bad94b2d93 --force --non-interactive

      - name: Build iOS Release
        working-directory: apps/mobile
        run: eas build --platform ios --non-interactive

  create-release:
    needs: [version-check, build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ needs.version-check.outputs.version }}
          draft: true
          prerelease: false
          files: |
            *.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}